services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Provide runtime defaults (optional)
      - ./config.js:/usr/share/nginx/html/config.js:ro
