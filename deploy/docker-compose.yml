services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    # If you want GPU on Linux, install NVIDIA Container Toolkit and add:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  cors-proxy:
    image: node:24-alpine
    restart: unless-stopped
    command:
      [
        "sh",
        "-lc",
        "npx -y local-cors-proxy@latest --proxyUrl https://ollama.com/api/ --port 8080 --proxyPartial ''",
      ]

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8085:80"
    depends_on:
      - ollama
      - cors-proxy
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Provide runtime defaults (optional)
      - ./config.js:/usr/share/nginx/html/config.js:ro

volumes:
  ollama:

